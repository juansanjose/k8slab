# LLM Fine-tuning with LoRA on RunPod GPU
# Uses RunPod as the backend (recommended - more reliable than Vast.ai)
# Logs metrics and artifacts to local MLflow/MinIO
# Cost: ~$0.20-0.44/hr for RTX 4090

resources:
  cloud: runpod
  accelerators: L4:1
  disk_size: 80
  image_id: docker:pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime

envs:
  MLFLOW_TRACKING_URI: http://localhost:30500
  MLFLOW_S3_ENDPOINT_URL: http://localhost:30900
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin123
  MODEL_NAME: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  DATASET_NAME: tatsu-lab/alpaca
  NUM_EPOCHS: "1"
  BATCH_SIZE: "2"
  LEARNING_RATE: "2e-4"
  HF_HOME: /workspace/huggingface_cache

setup: |
  echo "[setup] Installing dependencies..."
  pip install -q torch==2.3.0 transformers==4.45.0 datasets accelerate peft bitsandbytes mlflow boto3
  echo "[setup] GPU info:"
  nvidia-smi --query-gpu=name,memory.total --format=csv

run: |
  cd /workspace
  
  echo "[run] Installing dependencies..."
  pip install -q torch==2.3.0 transformers==4.45.0 datasets accelerate peft bitsandbytes mlflow boto3
  
  cat > train_llm.py << 'PYEOF'
  import os
  import mlflow
  import torch
  from datasets import load_dataset
  from transformers import (
      AutoModelForCausalLM,
      AutoTokenizer,
      TrainingArguments,
      Trainer,
      DataCollatorForLanguageModeling
  )
  from peft import LoraConfig, get_peft_model, TaskType
  
  model_name = os.getenv("MODEL_NAME", "TinyLlama/TinyLlama-1.1B-Chat-v1.0")
  dataset_name = os.getenv("DATASET_NAME", "tatsu-lab/alpaca")
  output_dir = "/workspace/models/tinyllama-finetuned"
  num_epochs = int(os.getenv("NUM_EPOCHS", "1"))
  batch_size = int(os.getenv("BATCH_SIZE", "2"))
  learning_rate = float(os.getenv("LEARNING_RATE", "2e-4"))
  
  mlflow.set_tracking_uri(os.getenv("MLFLOW_TRACKING_URI"))
  mlflow.set_experiment("llm-finetuning")
  
  with mlflow.start_run(run_name=f"{model_name.split('/')[-1]}-lora"):
      mlflow.log_params({
          "model": model_name,
          "dataset": dataset_name,
          "epochs": num_epochs,
          "batch_size": batch_size,
          "learning_rate": learning_rate,
          "gpu": "RTX4090",
          "method": "LoRA"
      })
      
      print(f"Loading model: {model_name}")
      model = AutoModelForCausalLM.from_pretrained(
          model_name,
          torch_dtype=torch.float16,
          device_map="auto"
      )
      tokenizer = AutoTokenizer.from_pretrained(model_name)
      tokenizer.pad_token = tokenizer.eos_token
      
      lora_config = LoraConfig(
          r=16,
          lora_alpha=32,
          target_modules=["q_proj", "v_proj"],
          lora_dropout=0.05,
          bias="none",
          task_type=TaskType.CAUSAL_LM
      )
      model = get_peft_model(model, lora_config)
      
      trainable = sum(p.numel() for p in model.parameters() if p.requires_grad)
      total = sum(p.numel() for p in model.parameters())
      print(f"Trainable params: {trainable:,} / {total:,} ({100*trainable/total:.2f}%)")
      mlflow.log_param("trainable_params", trainable)
      mlflow.log_param("total_params", total)
      
      print(f"Loading dataset: {dataset_name}")
      dataset = load_dataset(dataset_name, split="train[:1000]")
      
      def tokenize(examples):
          return tokenizer(
              examples["text"],
              truncation=True,
              max_length=512,
              padding="max_length"
          )
      
      tokenized = dataset.map(tokenize, batched=True, remove_columns=dataset.column_names)
      
      training_args = TrainingArguments(
          output_dir="/tmp/results",
          num_train_epochs=num_epochs,
          per_device_train_batch_size=batch_size,
          gradient_accumulation_steps=4,
          learning_rate=learning_rate,
          fp16=True,
          logging_steps=10,
          save_strategy="epoch",
          report_to=[]
      )
      
      # Custom callback to log metrics to MLflow
      from transformers import TrainerCallback
      
      class MLflowCallback(TrainerCallback):
          def __init__(self):
              self.step = 0
          
          def on_log(self, args, state, control, logs=None, **kwargs):
              if logs:
                  for key, value in logs.items():
                      if isinstance(value, (int, float)):
                          mlflow.log_metric(key, value, step=state.global_step)
              self.step = state.global_step
      
      callback = MLflowCallback()
      
      trainer = Trainer(
          model=model,
          args=training_args,
          train_dataset=tokenized,
          data_collator=DataCollatorForLanguageModeling(tokenizer, mlm=False),
          callbacks=[callback],
      )
      
      print("Starting training...")
      train_result = trainer.train()
      
      # Log final training metrics
      mlflow.log_metric("final_train_loss", train_result.training_loss)
      mlflow.log_metric("train_runtime", train_result.metrics.get("train_runtime", 0))
      mlflow.log_metric("train_samples_per_second", train_result.metrics.get("train_samples_per_second", 0))
      
      # Log GPU metrics
      if torch.cuda.is_available():
          mlflow.log_metric("gpu_memory_allocated_mb", torch.cuda.memory_allocated() / 1024**2)
          mlflow.log_metric("gpu_memory_reserved_mb", torch.cuda.memory_reserved() / 1024**2)
      
      # Save model artifacts
      print(f"Saving model to {output_dir}")
      os.makedirs(output_dir, exist_ok=True)
      model.save_pretrained(output_dir)
      tokenizer.save_pretrained(output_dir)
      
      # Log model files as artifacts
      mlflow.log_artifacts(output_dir, artifact_path="model")
      
      # Create and log training config
      config_path = "/tmp/training_config.json"
      import json
      with open(config_path, "w") as f:
          json.dump({
              "model": model_name,
              "dataset": dataset_name,
              "epochs": num_epochs,
              "batch_size": batch_size,
              "learning_rate": learning_rate,
              "lora_r": 16,
              "lora_alpha": 32,
              "lora_dropout": 0.05,
              "trainable_params": trainable,
              "total_params": total,
          }, f, indent=2)
      mlflow.log_artifact(config_path, artifact_path="config")
      
      print("Model and artifacts saved!")
      print(f"View results at: {os.getenv('MLFLOW_TRACKING_URI')}")
  PYEOF
  
  python train_llm.py
  
  echo ""
  echo "Job complete! Model saved to MinIO s3://models/tinyllama-finetuned"