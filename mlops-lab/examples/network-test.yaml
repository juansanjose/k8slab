apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-training-with-network
spec:
  template:
    metadata:
      annotations:
        vast.ai/gpu-name: "RTX 4090"
        vast.ai/max-dph: "0.50"
        vast.ai/disk-gb: "30"
    spec:
      nodeName: virtual-vastai
      restartPolicy: Never
      containers:
      - name: training
        image: python:3.10-slim
        command:
        - /bin/sh
        - -c
        - |
          echo "=== GPU Training with Cluster Network ==="
          echo "This container should have Tailscale installed"
          echo "and should be able to reach the cluster."
          echo ""
          
          # Wait for tailscale to be ready (installed by onstart script)
          sleep 10
          
          # Check if tailscale is available
          if command -v tailscale &> /dev/null; then
            echo "Tailscale is installed!"
            echo "Tailscale IP: $(tailscale ip -4 2>/dev/null || echo 'not ready')"
            echo ""
            
            # Test reaching cluster services
            echo "Testing cluster connectivity..."
            
            # Test MLflow
            echo -n "MLflow (port 30500): "
            curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://100.87.186.22:30500/api/2.0/mlflow/experiments/list || echo "FAILED"
            echo ""
            
            # Test MinIO
            echo -n "MinIO (port 30900): "
            curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://100.87.186.22:30900/minio/health/live || echo "FAILED"
            echo ""
            
            # Test k3s API
            echo -n "k3s API (port 6443): "
            curl -k -s --max-time 5 -o /dev/null -w "%{http_code}" https://100.87.186.22:6443/healthz || echo "FAILED"
            echo ""
          else
            echo "WARNING: Tailscale not found in container"
            echo "The onstart script may have failed."
          fi
          
          echo ""
          echo "=== Running actual workload ==="
          echo "In a real scenario, this would:"
          echo "1. Download model from HuggingFace"
          echo "2. Download dataset"
          echo "3. Fine-tune with MLflow tracking"
          echo "4. Save results to MinIO"
          echo ""
          echo "Sleeping for 60 seconds to simulate work..."
          sleep 60
          
          echo "Work complete!"
        resources:
          limits:
            nvidia.com/gpu: "1"
      tolerations:
      - key: "virtual-kubelet.io/provider"
        operator: "Equal"
        value: "vastai"
        effect: "NoSchedule"
      activeDeadlineSeconds: 600  # 10 minutes max