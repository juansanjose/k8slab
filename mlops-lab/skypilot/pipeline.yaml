# Alternative: Python-based Kubeflow pipeline
# This is the Python SDK version that generates the YAML above

# pipeline.py
from kfp import dsl
from kfp.dsl import ContainerOp

@dsl.pipeline(
    name='MLOps with SkyPilot GPU',
    description='Pipeline that uses SkyPilot for GPU compute'
)
def mlops_pipeline():
    # Step 1: Data prep (Kubernetes)
    data_prep = dsl.ContainerOp(
        name='data-preparation',
        image='python:3.10-slim',
        command=['python', '-c'],
        arguments=['print("Preparing data...")']
    )
    
    # Step 2: GPU training (SkyPilot)
    gpu_training = dsl.ContainerOp(
        name='gpu-training',
        image='berkeleyskypilot/skypilot:latest',
        command=['bash', '-c'],
        arguments=["""
            cat > /tmp/task.yaml << 'EOF'
            task:
              name: kfp-training
              resources:
                cloud: vast
                accelerators: RTX4090:1
              run: |
                echo "Training on GPU..."
            EOF
            sky launch /tmp/task.yaml -c kfp-run --yes --down
        """]
    )
    gpu_training.after(data_prep)
    
    # Step 3: Evaluation (Kubernetes)
    evaluation = dsl.ContainerOp(
        name='evaluation',
        image='python:3.10-slim',
        command=['python', '-c'],
        arguments=['print("Evaluating model...")']
    )
    evaluation.after(gpu_training)
    
    # Step 4: Deployment (Kubernetes)
    deployment = dsl.ContainerOp(
        name='deployment',
        image='python:3.10-slim',
        command=['python', '-c'],
        arguments=['print("Deploying model...")']
    )
    deployment.after(evaluation)

if __name__ == '__main__':
    import kfp.compiler as compiler
    compiler.Compiler().compile(mlops_pipeline, 'mlops_pipeline.yaml')
    print("Pipeline compiled to mlops_pipeline.yaml")