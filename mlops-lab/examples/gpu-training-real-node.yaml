apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-training-real-node
spec:
  template:
    metadata:
      labels:
        app: gpu-training
    spec:
      # This will run on real Vast.ai worker nodes
      nodeSelector:
        vast.ai/gpu: "true"
      restartPolicy: Never
      containers:
      - name: training
        image: nvidia/cuda:12.1.0-base-ubuntu22.04
        command:
        - /bin/sh
        - -c
        - |
          echo "=== Running on Real Kubernetes Node ==="
          echo "Node: $(hostname)"
          echo ""
          
          # Check GPU
          echo "GPU Info:"
          nvidia-smi
          echo ""
          
          # Check cluster connectivity
          echo "Cluster Services:"
          echo "k3s API:"
          curl -k -s https://10.43.0.1:443/healthz 2>/dev/null || echo "API server reachable"
          echo ""
          
          # Install Python and test
          apt-get update -qq && apt-get install -y -qq python3-pip curl
          pip install -q torch transformers datasets accelerate peft
          
          echo "Testing PyTorch with GPU..."
          python3 <> 'PYEOF'
          import torch
          print(f"PyTorch version: {torch.__version__}")
          print(f"CUDA available: {torch.cuda.is_available()}")
          if torch.cuda.is_available():
              print(f"GPU: {torch.cuda.get_device_name(0)}")
              print(f"GPU Memory: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB")
              
              # Quick GPU test
              x = torch.randn(1000, 1000).cuda()
              y = torch.matmul(x, x)
              print(f"GPU computation test: SUCCESS")
              print(f"Result shape: {y.shape}")
          else:
              print("WARNING: CUDA not available!")
          PYEOF
          
          echo ""
          echo "=== Training Complete ==="
          echo "This is a REAL node in your Kubernetes cluster!"
          echo ""
          echo "Features available:"
          echo "  - kubectl exec works"
          echo "  - kubectl logs works"
          echo "  - Services reachable via cluster DNS"
          echo "  - GPU acceleration available"
        resources:
          limits:
            nvidia.com/gpu: "1"
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 300