apiVersion: v1
kind: Service
metadata:
  name: mlops-ingress
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
    name: mlflow
---
apiVersion: v1
kind: Service
metadata:
  name: minio-ingress
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: minio
  ports:
  - port: 9001
    targetPort: 9001
    nodePort: 30901
    name: console
  - port: 9000
    targetPort: 9000
    nodePort: 30900
    name: s3
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter-ingress
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: jupyterhub
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30800
    name: jupyter