apiVersion: apps/v1
kind: Deployment
metadata:
  name: kserve-controller
  namespace: kserve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kserve-controller
  template:
    metadata:
      labels:
        app: kserve-controller
    spec:
      serviceAccountName: kserve-controller
      containers:
      - name: manager
        image: kserve/kserve-controller:v0.13.0
        ports:
        - containerPort: 8443
          name: webhook-server
          protocol: TCP
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-controller
  namespace: kserve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kserve-controller
rules:
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices", "inferenceservices/status", "trainedmodels", "trainedmodels/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services", "configmaps", "secrets", "events", "pods"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kserve-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kserve-controller
subjects:
- kind: ServiceAccount
  name: kserve-controller
  namespace: kserve
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inferenceservices.serving.kserve.io
spec:
  group: serving.kserve.io
  versions:
  - name: v1beta1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              predictor:
                type: object
                properties:
                  model:
                    type: object
                    properties:
                      modelFormat:
                        type: object
                        properties:
                          name:
                            type: string
                      storageUri:
                        type: string
                      resources:
                        type: object
                        properties:
                          limits:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                          requests:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
  scope: Namespaced
  names:
    kind: InferenceService
    plural: inferenceservices
    singular: inferenceservice
    shortNames:
    - isvc