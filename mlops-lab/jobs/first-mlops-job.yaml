apiVersion: batch/v1
kind: Job
metadata:
  name: first-mlops-job
  namespace: mlops
spec:
  template:
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: vastai-gpu
      tolerations:
      - key: "virtual-kubelet.io/provider"
        operator: "Equal"
        value: "vastai"
        effect: "NoSchedule"
      containers:
      - name: gpu-test
        image: nvcr.io/nvidia/pytorch:23.10-py3
        # GPU resources removed - virtual node doesn't advertise GPU capacity yet
        # resources:
        #   limits:
        #     nvidia.com/gpu: "1"
        command:
        - bash
        - -c
        - |
          echo "=== First MLOps Job ==="
          echo "Testing GPU access..."
          nvidia-smi
          
          echo ""
          echo "Testing CUDA..."
          python3 -c "
          import torch
          print(f'PyTorch version: {torch.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          print(f'GPU count: {torch.cuda.device_count()}')
          if torch.cuda.is_available():
              print(f'GPU name: {torch.cuda.get_device_name(0)}')
          "
          
          echo ""
          echo "Testing MLFlow connectivity..."
          curl -s http://mlflow.mlops.svc.cluster.local:5000/api/2.0/mlflow/experiments/list || echo "MLFlow not accessible"
          
          echo ""
          echo "Job complete!"
      restartPolicy: Never
  backoffLimit: 2