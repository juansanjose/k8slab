apiVersion: v1
kind: Pod
metadata:
  name: gpu-training
  annotations:
    vast.ai/gpu-name: "RTX 4090"
    vast.ai/max-dph: "0.50"
    vast.ai/disk-gb: "20"
spec:
  nodeName: virtual-vastai
  containers:
  - name: training
    image: nvidia/cuda:12.0.0-base-ubuntu22.04
    command: ["sleep", "300"]
    resources:
      limits:
        nvidia.com/gpu: "1"
  tolerations:
  - key: "virtual-kubelet.io/provider"
    operator: "Equal"
    value: "vastai"
    effect: "NoSchedule"