apiVersion: apps/v1
kind: Deployment
metadata:
  name: tensorboard
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tensorboard
  template:
    metadata:
      labels:
        app: tensorboard
    spec:
      containers:
      - name: tensorboard
        image: python:3.10-slim
        command:
        - /bin/sh
        - -c
        - |
          pip install tensorboard
          tensorboard --logdir=/logs --host=0.0.0.0 --port=6006
        volumeMounts:
        - name: logs
          mountPath: /logs
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tensorboard
  namespace: mlops
spec:
  selector:
    app: tensorboard
  ports:
  - port: 6006
    targetPort: 6006
    nodePort: 30606
  type: NodePort
