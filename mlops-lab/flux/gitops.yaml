apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: mlops-lab
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/juansanjose/k8slab.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mlops-lab
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: mlops
  sourceRef:
    kind: GitRepository
    name: mlops-lab
  path: ./mlops-lab/base
  prune: true
  wait: true
  timeout: 5m