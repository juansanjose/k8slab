# Quick GPU connectivity and PyTorch test
# Uses RunPod as the backend (recommended - more reliable than Vast.ai)
# Cost: ~$0.20-0.44/hr for RTX 4090

resources:
  cloud: runpod
  accelerators: RTX4090:1
  disk_size: 10

envs:
  MLFLOW_TRACKING_URI: http://100.87.186.22:30500
  MINIO_ENDPOINT: http://100.87.186.22:30900

run: |
  echo "=========================================="
  echo "  SkyPilot GPU Test on RunPod"
  echo "=========================================="
  echo ""
  
  echo "[1/5] GPU Information:"
  nvidia-smi
  echo ""
  
  echo "[2/5] PyTorch CUDA Test:"
  python3 -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'CUDA available: {torch.cuda.is_available()}'); print(f'CUDA version: {torch.version.cuda}'); print(f'GPU count: {torch.cuda.device_count()}'); print(f'GPU: {torch.cuda.get_device_name(0)}'); print(f'Memory: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB')"
  echo ""
  
  echo "[3/5] Testing MLflow connectivity:"
  curl -s --max-time 5 ${MLFLOW_TRACKING_URI} > /dev/null && echo "MLflow: REACHABLE" || echo "MLflow: NOT REACHABLE (check network)"
  echo ""
  
  echo "[4/5] Testing MinIO connectivity:"
  curl -s --max-time 5 ${MINIO_ENDPOINT}/minio/health/live > /dev/null && echo "MinIO: REACHABLE" || echo "MinIO: NOT REACHABLE (check network)"
  echo ""
  
  echo "[5/5] System info:"
  echo "CPU: $(nproc) cores"
  echo "RAM: $(free -h | awk '/^Mem:/ {print $2}')"
  echo "Disk: $(df -h / | awk 'NR==2 {print $4}') available"
  echo ""
  
  echo "=========================================="
  echo "  GPU Test Complete!"
  echo "=========================================="