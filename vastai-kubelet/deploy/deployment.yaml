apiVersion: apps/v1
kind: Deployment
metadata:
  name: vastai-kubelet
  namespace: vastai-system
  labels:
    app: vastai-kubelet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vastai-kubelet
  template:
    metadata:
      labels:
        app: vastai-kubelet
    spec:
      serviceAccountName: vastai-kubelet
      containers:
      - name: kubelet
        image: localhost:5000/vastai-kubelet:latest
        imagePullPolicy: Always
        env:
        - name: VASTAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vastai-credentials
              key: api-key
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-credentials
              key: auth-key
        - name: CLUSTER_IP
          value: "100.87.186.22"
        - name: VK_NODE_NAME
          value: "virtual-vastai"
        - name: MAX_DPH
          value: "1.0"
        - name: MIN_COMPUTE_CAP
          value: "700"
        - name: SEARCH_LIMIT
          value: "10"
        - name: SYNC_INTERVAL
          value: "30s"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"