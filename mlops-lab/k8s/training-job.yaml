apiVersion: batch/v1
kind: Job
metadata:
  name: llm-training
  namespace: mlops
  labels:
    app: training
    type: llm
spec:
  template:
    metadata:
      labels:
        app: training
        type: llm
    spec:
      restartPolicy: OnFailure
      containers:
      - name: trainer
        image: localhost:5000/mlops-training:latest
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            nvidia.com/gpu: 1
        env:
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-config
              key: tracking-uri
        - name: MLFLOW_S3_ENDPOINT_URL
          valueFrom:
            secretKeyRef:
              name: mlflow-config
              key: s3-endpoint
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: cloud-credentials
              key: minio-access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: cloud-credentials
              key: minio-secret-key
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: training-config
              key: default-model
        - name: DATASET_NAME
          valueFrom:
            configMapKeyRef:
              name: training-config
              key: default-dataset
        - name: NUM_EPOCHS
          valueFrom:
            configMapKeyRef:
              name: training-config
              key: default-epochs
        - name: BATCH_SIZE
          valueFrom:
            configMapKeyRef:
              name: training-config
              key: default-batch-size
        - name: LEARNING_RATE
          valueFrom:
            configMapKeyRef:
              name: training-config
              key: default-learning-rate
        - name: HF_HOME
          value: "/workspace/huggingface_cache"
        volumeMounts:
        - name: model-storage
          mountPath: /workspace/models
        - name: cache
          mountPath: /workspace/huggingface_cache
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage-pvc
      - name: cache
        emptyDir: {}
      # GPU node selector - this would run on local GPU nodes
      # For cloud GPU, we use SkyPilot instead
      # nodeSelector:
      #   nvidia.com/gpu.present: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage-pvc
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
