# Kubeflow Pipeline with SkyPilot GPU Steps
# This pipeline runs on Kubernetes but delegates GPU work to SkyPilot

apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: mlops-pipeline-with-skypilot
spec:
  entrypoint: mlops-pipeline
  templates:
  - name: mlops-pipeline
    dag:
      tasks:
      - name: data-preparation
        template: data-prep
        
      - name: gpu-training
